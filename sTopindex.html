<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初めての工作ガイド</title>

  <!-- フォント・CSSの読み込み -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sTopostyle.css">
</head>
<body>

  <!-- ヘッダー (共通ハンバーガーメニュー) -->
  <header class="header">
    <div class="header-inner">
      <button class="hamburger-btn" id="js-hamburger" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav-menu" id="js-nav">
        <ul>
          <li><a href="sTopindex.html">TOP</a></li>
          <li><a href="sKindex.html">切り絵</a></li>
          <li><a href="sNindex.html">粘土</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">

    <!-- 1. メインタイトル（看板風デザイン） -->
    <section class="top-hero">
      <div class="sign-board">
        <!-- 上の鎖/リング飾り -->
        <div class="chain chain-left"></div>
        <div class="chain chain-right"></div>
        
        <!-- 左上のテープラベル -->
        <div class="tape-label">初めての</div>
        
        <!-- タイトル文字 -->
        <h1 class="top-title">
          <span class="large">工作</span>
          <span class="small">ガイド</span>
        </h1>
      </div>
    </section>

    <!-- 2. 作品紹介ギャラリー -->
    <section class="gallery-section">
      
      <!-- 上段：切り絵 -->
      <div class="gallery-item">
        <a href="sKindex.html" class="img-link-btn">
          <img src="png/切り絵.PNG" alt="切り絵ページへ" class="main-img">
          <!-- スマホ用中央ラベル -->
          <span class="btn-label">切り絵</span>
        </a>
        <!-- 装飾画像 -->
        <img src="png/無題681_20260723030423.PNG" class="deco-icon star-icon" alt="星">
        <img src="png/無題681_20260723025931.PNG" class="deco-icon flower-pink" alt="さくら">
      </div>

      <!-- 下段：粘土 -->
      <div class="gallery-item">
        <a href="sNindex.html" class="img-link-btn">
          <img src="png/いちご.png" alt="粘土ページへ" class="main-img">
          <!-- スマホ用中央ラベル -->
          <span class="btn-label">粘土</span>
        </a>
        <!-- 装飾画像 -->
        <img src="png/ぞう.PNG" class="deco-icon elephant-icon" alt="ぞう">
        <img src="png/アイス.PNG" class="deco-icon ice-cream-icon" alt="アイスクリーム">
      </div>

    </section>

    <!-- 3. はじめに アコーディオンエリア -->
    <div class="intro-accordion">
      <button class="intro-btn" id="js-intro-btn">はじめに</button>
      
      <!-- ボタンを押すと出てくる文面 -->
      <div class="intro-text-box" id="js-intro-content">
        <p>このサイトは、何かと難しそうと思われる工作への取っ掛かりを作ろうと思い、制作しました。<br>
        工作のセンスが無いと難しそう…というイメージがこのサイトを見て、なくなったら嬉しいです。</p>
      </div>
    </div>

  </main>

  <!-- スマホ用：画面下部 固定ナビゲーションバー -->
  <nav class="bottom-nav">
    <a href="sTopindex.html" class="bottom-nav-item">
      <!-- ホームアイコン（画像がない場合は 🏠 文字でも可） -->
      <span class="nav-icon">🏠</span>
    </a>
    <a href="sKindex.html" class="bottom-nav-item">
      <img src="png/無題681_20260723025931.PNG" alt="切り絵" class="nav-img">
    </a>
    <a href="sNstyle.css" class="bottom-nav-item">
      <img src="png/ぞう.PNG" alt="粘土" class="nav-img">
    </a>
  </nav>

  <!-- JavaScript -->
  <script>
    // 1. ハンバーガーメニュー開閉
    const btn = document.getElementById('js-hamburger');
    const nav = document.getElementById('js-nav');

    if (btn && nav) {
      btn.addEventListener('click', () => {
        btn.classList.toggle('is-active');
        nav.classList.toggle('is-active');
      });

      const navLinks = nav.querySelectorAll('a');
      navLinks.forEach(link => {
        link.addEventListener('click', () => {
          btn.classList.remove('is-active');
          nav.classList.remove('is-active');
        });
      });
    }

    // 2. 「はじめに」アコーディオン開閉
    const introBtn = document.getElementById('js-intro-btn');
    const introContent = document.getElementById('js-intro-content');

    if (introBtn && introContent) {
      introBtn.addEventListener('click', () => {
        introContent.classList.toggle('is-open');
      });
    }
  </script>

</body>
</html>
