<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粘土 - 初めての工作ガイド</title>

  <!-- フォント・CSSの読み込み -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sNstyle.css">
</head>
<body>

  <!-- ヘッダー (共通ハンバーガーメニュー) -->
  <header class="header">
    <div class="header-inner">
      <button class="hamburger-btn" id="js-hamburger" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav-menu" id="js-nav">
        <ul>
          <li><a href="sTopindex.html">TOP</a></li>
          <li><a href="sKindex.html">切り絵</a></li>
          <li><a href="sNindex.html">粘土</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">

    <!-- 1. メイン画像 ＆ ドットインジケーター -->
    <section class="hero-slider-section">
      <div class="hero-img-wrapper">
        <!-- 粘土のメイン作品画像 -->
        <img src="png/粘土.png" alt="粘土作品" class="hero-img">
      </div>
      <!-- スライダー風ドット -->
      <div class="slider-dots">
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
    </section>

   <!-- 2. 3Dくるっと裏返る吹き出し ＆ Clickボタン -->
    <section class="thought-section">
      
      <!-- カード全体を包む枠 -->
      <div class="flip-card" id="js-flip-card">
        <div class="flip-card-inner">
          
          <!-- 表側（クリック前） -->
          <div class="cloud-bubble flip-front">
            <p>粘土って<br>こどものおもちゃじゃない？</p>
            <span class="bubble-sub sub-1"></span>
            <span class="bubble-sub sub-2"></span>
          </div>

          <!-- 裏側（クリック後：グラデーション＋マーカーテキスト） -->
          <div class="cloud-bubble flip-back">
            <p>
              <span class="marker"><ruby>大人も趣味にできる<span><br></span>
              <span class="marker">無限の可能性の工作！！</span>
            </p>
          </div>

        </div>
      </div>

      <!-- Clickボタン -->
      <button class="click-btn" id="js-click-btn">Click</button>
    </section>

    <!-- 3. おおまかな流れ（カードデザイン） -->
    <section class="flow-section">
      <div class="flow-card">
        <div class="flow-header">
          <h2>おおまかな流れ</h2>
        </div>
        <div class="flow-body">
          <!-- 左側：制作手順の画像 -->
          <div class="flow-img-box">
            <img src="png/無題677_20260701211704.PNG" alt="粘土の制作工程" class="flow-img">
          </div>
          <!-- 右側：説明文 ＆ 背景数字 -->
          <div class="flow-text-box">
            <span class="bg-number">1</span>
            <div class="flow-text-content">
              <h3>1. テーマを決める</h3>
              <p>（今回作るのはキャラクターもの）</p>
            </div>
            <!-- 右下の矢印アイコン -->
            <span class="arrow-icon">▶</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 4. 制作のコツ ボタン -->
    <section class="tips-section">
      <button class="tips-btn">
        <span class="tips-icon">!</span>
        <span class="tips-text">制作のコツ</span>
      </button>
    </section>

  </main>

  <!-- スマホ用：画面下部 固定ナビゲーションバー -->
  <nav class="bottom-nav">
    <a href="sTopindex.html" class="bottom-nav-item">
      <span class="nav-icon">🏠</span>
    </a>
    <a href="sKindex.html" class="bottom-nav-item">
      <img src="png/無題681_20260723025931.PNG" alt="切り絵" class="nav-img">
    </a>
    <a href="sNindex.html" class="bottom-nav-item active">
      <img src="png/ぞう.PNG" alt="粘土" class="nav-img">
    </a>
  </nav>

  <!-- JavaScript (ハンバーガーメニュー) -->
  <script>
    const btn = document.getElementById('js-hamburger');
    const nav = document.getElementById('js-nav');

    if (btn && nav) {
      btn.addEventListener('click', () => {
        btn.classList.toggle('is-active');
        nav.classList.toggle('is-active');
      });

      const navLinks = nav.querySelectorAll('a');
      navLinks.forEach(link => {
        link.addEventListener('click', () => {
          btn.classList.remove('is-active');
          nav.classList.remove('is-active');
        });
      });
    }

    
    // Clickボタンで吹き出しをひっくり返す
    const clickBtn = document.getElementById('js-click-btn');
    const flipCard = document.getElementById('js-flip-card');

    if (clickBtn && flipCard) {
      clickBtn.addEventListener('click', () => {
        flipCard.classList.toggle('is-flipped');
      });
    }
 

  </script>

</body>
</html>
